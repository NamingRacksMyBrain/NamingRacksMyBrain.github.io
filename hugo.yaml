baseURL: "https://NamingRacksMyBrain.github.io/" # 主站的 URL
title: Duo's Blog # 站点标题
copyright: "[©2026 Duo's Blog](https://NamingRacksMyBrain.github.io/)" # 网站的版权声明，通常显示在页脚
theme: PaperMod # 主题
languageCode: zh-cn # 语言

enableInlineShortcodes: true # shortcode，类似于模板变量，可以在写 markdown 的时候便捷地插入，官方文档中有一个视频讲的很通俗
hasCJKLanguage: true # 是否有 CJK 的字符
enableRobotsTXT: true # 允许生成 robots.txt
buildDrafts: false # 构建时是否包括草稿
buildFuture: false # 构建未来发布的内容
buildExpired: false # 构建过期的内容
enableEmoji: true # 允许 emoji
pygmentsUseClasses: true
defaultContentLanguage: zh # 顶部首先展示的语言界面
defaultContentLanguageInSubdir: false # 是否要在地址栏加上默认的语言代码

caches:
  images:
    dir: :cacheDir/images

languages:
  zh:
    languageName: "中文" # 展示的语言名
    weight: 1 # 权重
    taxonomies: # 分类系统
      tag: tags
    # https://gohugo.io/content-management/menus/#define-in-site-configuration
    menus:
      main:
        - name: 首页
          pageRef: /
          weight: 4 # 控制在页面上展示的前后顺序
        - name: 归档
          pageRef: archives/
          weight: 5
        - name: 标签
          pageRef: tags/
          weight: 10
        - name: 搜索
          pageRef: search/
          weight: 20
        - name: 网站统计
          url: https://umami-blog-three.vercel.app/share/G87mmPXwOfautFzN
          weight: 20
        - name: 关于
          pageRef: about/
          weight: 21

pagination:
  pagerSize: 8

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  description: "Theme PaperMod - https://github.com/adityatelange/hugo-PaperMod"
  author: Duo
  defaultTheme: dark
  ShowShareButtons: false
  ShowReadingTime: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  comments: true
  images: ["favicon.png"]
  DateFormat : "2006-01-02"

  homeInfoParams:
    Title: "👋 Hi there!"
    Content: >
      - Welcome to Duo's blog!

      - Feel free to comment anything you want :)  

  socialIcons:
    - name: github
      url: "https://github.com/NamingRacksMyBrain"

  # 搜索
  fuseOpts:
      isCaseSensitive: false # 是否大小写敏感
      shouldSort: true # 是否排序
      location: 0
      distance: 1000
      threshold: 0.4
      minMatchCharLength: 0
      # limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
      keys: ["title", "permalink", "summary", "content"]
      includeMatches: true
  
  # <a href="https://www.flaticon.com/free-icons/shiba-inu" title="shiba inu icons">Shiba inu icons created by Paul J. - Flaticon</a>
  assets:
      favicon: "favicon.png"
      favicon16x16: "favicon.png"
      favicon32x32: "favicon.png"
      apple_touch_icon: "favicon.png"
      safari_pinned_tab: "favicon.png"
      disableHLJS: true

  giscus:
    repo: "NamingRacksMyBrain/NamingRacksMyBrain.github.io"
    repoId: "R_kgDOQqLCQQ"
    category: "Announcements"
    categoryId: "DIC_kwDOQqLCQc4Cz5uF"
    mapping: "pathname"
    strict: "0"
    reactionsEnabled: "1"
    emitMetadata: "0"
    inputPosition: "bottom"
    lightTheme: "light"
    darkTheme: "dark"
    lang: "zh-CN"
    crossorigin: "anonymous"
  
  # 添加 Umami 分析配置
  analytics:
    umami:
      enable: true
      website_id: "929daa1b-bedf-4572-a243-c0a80ea475ac"
      url: "https://umami-blog-three.vercel.app/Duo"

# https://github.com/adityatelange/hugo-PaperMod/wiki/Features#search-page
outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true # 必须开启，否则你的任务列表复选框显示不出来
    extensions:
      taskList: true # 开启任务列表支持
  highlight:
    noClasses: true      # 建议保持 true，这样 CSS 覆盖最简单
    codeFences: true     # 开启代码围栏支持
    guessSyntax: true    # 自动识别语言
    lineNos: true        # 显示行号
    lineNumbersInTable: false # 设为 false，复制代码时不会带上行号（非常有用！）
    style: dracula       # 选一个你喜欢的配色名（见上表）


